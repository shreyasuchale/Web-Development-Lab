<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Lab Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            background: white;
            width: 95%;
            height: 90vh;
            border-radius: 20px;
            display: flex;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: #ffffff;
            border-right: 1px solid #eee;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h2 {
            text-align: center;
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .exp-btn {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            text-align: left;
        }

        .exp-btn:hover {
            background: #eef2ff;
            transform: translateX(5px);
        }

        .exp-btn.active {
            background: #4e73df;
            color: white;
            border-color: #4e73df;
        }

        .exp-num {
            background: #4e73df;
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 11px;
            margin-right: 12px;
            min-width: 45px;
            text-align: center;
        }

        .active .exp-num {
            background: white;
            color: #4e73df;
        }

        .output-screen {
            flex-grow: 1;
            padding: 20px;
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        #output-display {
            border: 1px solid #eee;
            border-radius: 15px;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #ffffff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

            <div id="output-display">

            </div>

        };

        const btnContainer = document.getElementById('btn-container');
        const display = document.getElementById('output-display');
        const titleText = document.getElementById('exp-title');

        for (let i = 1; i <= 13; i++) {
            const btn = document.createElement('button');
            btn.className = 'exp-btn';
            btn.innerHTML = `<span class="exp-num">Exp ${i}</span> <span style="font-size:13px; font-weight:500;">${experiments[i].title}</span>`;
            
            btn.onclick = function() {
                document.querySelectorAll('.exp-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                titleText.innerText = experiments[i].title;
                display.innerHTML = "";
                const iframe = document.createElement('iframe');
                display.appendChild(iframe);
                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write(experiments[i].content);
                doc.close();
            };
            btnContainer.appendChild(btn);
        }
